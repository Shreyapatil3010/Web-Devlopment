<!DOCTYPE html>
<html>
<head>
    <title>Text Formatting</title>
</head>
<body>
    <h2>Text Formatting Examples</h2>
    <p><b>Bold Text</b></p>
    <p><i>Italic Text</i></p>
    <p><u>Underlined Text</u></p>
    <p><strike>Strikethrough Text</strike></p>
    <p>Subscript: H<sub>2</sub>O</p>
    <p>Superscript: A<sup>2</sup> + B<sup>2</sup></p>
    <p><mark>Highlighted Text</mark></p>
    <p><tt>Monospaced/Teletype Text</tt></p>
</body>
</html>
